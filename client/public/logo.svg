<svg xmlns="http://www.w3.org/2000/svg" viewBox="-32 -32 576 576">
  <defs>
    <!-- The CSS that powers the flowing neon animation -->
    <style>
      @keyframes neonFlow {
        100% {
          stroke-dashoffset: -100;
        }
      }
      .neon-border {
        stroke-dasharray: 30 70; /* The beam takes up 30% of the border, the rest is dark */
        stroke-dashoffset: 0;
        animation: neonFlow 4s linear infinite; /* 4 seconds per full rotation */
      }
    </style>

    <linearGradient id="emerald" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- The physical bloom/glow effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" /> <!-- Double merge for extra brightness -->
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- 1. Dark background with static faint border -->
  <rect width="512" height="512" rx="112" fill="#09090b" stroke="#18181b" stroke-width="16" />
  
  <!-- 2. THE NEW GLOWING ANIMATED BORDER (Powered by Emerald gradient) -->
  <rect width="512" height="512" rx="112" fill="none" stroke="url(#emerald)" stroke-width="16" filter="url(#neon-glow)" class="neon-border" pathLength="100" />
  
  <!-- 3. The 'C' curve (Violet) -->
  <path d="M 340 140 A 140 140 0 1 0 340 372" fill="none" stroke="url(#violet)" stroke-width="48" stroke-linecap="round" />
  
  <!-- 4. 3D CUTOUT SHADOW (Creates the gap behind the arrow) -->
  <path d="M 140 320 L 220 240 L 280 300 L 400 180" fill="none" stroke="#09090b" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 300 180 L 400 180 L 400 280" fill="none" stroke="#09090b" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" />

  <!-- 5. The Market Trend Arrow (Emerald) -->
  <path d="M 140 320 L 220 240 L 280 300 L 400 180" fill="none" stroke="url(#emerald)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 300 180 L 400 180 L 400 280" fill="none" stroke="url(#emerald)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
</svg>
